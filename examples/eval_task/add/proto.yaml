operator:
  name: Add
  category: Elementwise
  difficulty: L1
  formula: z = x + y
  description: 逐元素加法运算（评测流水线 fixture，非生产评测目标）
  shape_support: 输入0-8维，两输入shape相同
  attrs: []
  inputs:
  - name: x
    description: 第1个输入张量
    dtype:
    - float16
    - float32
    - bfloat16
    - int32
  - name: y
    description: 第2个输入张量（与x同shape）
    dtype:
    - float16
    - float32
    - bfloat16
    - int32
  outputs:
  - name: z
    description: 输出张量，逐元素加法结果
    dtype:
    - float16
    - float32
    - bfloat16
    - int32
  schema: add(Tensor x, Tensor y) -> Tensor z