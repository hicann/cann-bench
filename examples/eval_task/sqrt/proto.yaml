operator:
  name: Sqrt
  category: Elementwise
  difficulty: L1
  formula: y = sqrt(x)
  description: 逐元素平方根运算（评测流水线 fixture，非生产评测目标）
  shape_support: 输入0-8维
  attrs: []
  inputs:
  - name: x
    description: 输入张量（值应非负以保证数值稳定）
    dtype:
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 输出张量，逐元素平方根结果
    dtype:
    - float16
    - float32
    - bfloat16
  schema: sqrt(Tensor x) -> Tensor y