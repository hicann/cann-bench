operator:
  name: Gather
  category: IndexGather
  difficulty: L2
  formula: y[i][m][n] = x[index[i]][m][n]
  description: 从输入Tensor的指定维度按index提取元素
  shape_support: 输入ND格式，支持任意维度
  attrs:
  - name: batch_dims
    type: INT64
    default: 0
    description: batch维度数
    required: false
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
    - bfloat16
    - int8
    - int32
    - int64
  - name: index
    description: 索引张量
    dtype:
    - float16
    - float32
    - bfloat16
    - int8
    - int32
    - int64
  outputs:
  - name: y
    description: 输出张量，gather结果
    dtype:
    - float16
    - float32
    - bfloat16
    - int8
    - int32
    - int64
  schema: gather(Tensor x, Tensor index, int batch_dims) -> Tensor y
