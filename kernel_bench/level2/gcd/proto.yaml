operator:
  name: Gcd
  category: Broadcast
  difficulty: L2
  formula: y = gcd(x1, x2)
  description: 计算两个整数的最大公约数
  shape_support: 输入支持广播
  attrs: []
  inputs:
  - name: x1
    description: 第1个输入张量
    dtype:
    - int16
    - int32
    - int64
  - name: x2
    description: 第2个输入张量
    dtype:
    - int16
    - int32
    - int64
  outputs:
  - name: y
    description: 输出张量，最大公约数
    dtype:
    - int16
    - int32
    - int64
  schema: gcd(Tensor x1, Tensor x2) -> Tensor y
