operator:
  name: ApplyAdamW
  category: FusedComposite
  difficulty: L2
  formula: |
    m_t = beta1 * m_{t-1} + (1 - beta1) * grad
    v_t = beta2 * v_{t-1} + (1 - beta2) * grad^2
    m_hat = m_t / (1 - beta1^t)
    v_hat = v_t / (1 - beta2^t)
    var_t = var_{t-1} - lr * (m_hat / (sqrt(v_hat) + eps) + weight_decay * var_{t-1})
  description: AdamW 优化器实现，解耦权重衰减
  shape_support: 'var/m/v/grad: 1-8 维'
  attrs:
  - name: lr
    type: float
    description: 学习率
    required: true
  - name: beta1
    type: float
    description: 一阶矩估计的指数衰减率 (默认 0.9)
    required: true
  - name: beta2
    type: float
    description: 二阶矩估计的指数衰减率 (默认 0.999)
    required: true
  - name: weight_decay
    type: float
    description: 权重衰减系数（解耦）
    required: true
  - name: epsilon
    type: float
    default: 1e-8
    description: 数值稳定常数
    required: false
  - name: maximize
    type: bool
    default: "false"
    description: 是否最大化目标函数（默认最小化）
    required: false
  inputs:
  - name: var
    description: 变量张量（需要优化的参数）
    dtype:
    - float32
    - float16
    - bfloat16
  - name: grad
    description: 梯度张量
    dtype:
    - float32
    - float16
    - bfloat16
  - name: m
    description: 一阶矩张量（动量）
    dtype:
    - float32
    - float16
    - bfloat16
  - name: v
    description: 二阶矩张量
    dtype:
    - float32
    - float16
    - bfloat16
  outputs:
  - name: y
    description: 更新后的变量
    dtype:
    - float32
    - float16
    - bfloat16
  schema: apply_adam_w(Tensor var, Tensor grad, Tensor m, Tensor v, float lr, float beta1, float beta2, float weight_decay, float epsilon=1e-8, bool maximize=false) -> Tensor y
