operator:
  name: ArgMax
  category: SortSelect
  difficulty: L3
  formula: y = argmax(x, axis=dimension)
  description: 返回张量在指定维度上的最大值的索引
  shape_support: 输入支持0-8维
  attrs:
  - name: dimension
    type: int64
    description: 计算argmax的维度
    required: true
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
    - bfloat16
    - int32
    - int64
  outputs:
  - name: y
    description: 输出张量，最大值的索引
    dtype:
    - int64
  schema: arg_max(Tensor x, int dimension) -> Tensor y
