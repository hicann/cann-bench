operator:
  name: Scatter
  category: ScatterUpdate
  difficulty: L2
  formula: y[index[i][j][k]] = src[i][j][k] (if dim == 0)
  description: 将 updates 按索引 indices 更新到 data 中
  shape_support: 输入 ND 格式
  attrs:
  - name: dim
    type: INT
    description: 沿哪个维度 scatter
    required: true
  - name: reduce
    type: STRING
    default: null
    description: 聚合方式，可选值：null(update), 'add', 'multiply', 'amin', 'amax'
    required: false
  inputs:
  - name: data
    description: 输入数据张量
    dtype:
    - float16
    - float32
    - bfloat16
    - int32
    - int64
  - name: indices
    description: 索引张量，值必须在 [0, data.size(dim)) 范围内
    dtype:
    - int32
    - int64
  - name: updates
    description: 更新值张量，与 data 维度数相同
    dtype:
    - float16
    - float32
    - bfloat16
    - int32
    - int64
  outputs:
  - name: y
    description: 输出张量，scatter 结果，与 data 形状相同
    dtype:
    - float16
    - float32
    - bfloat16
    - int32
    - int64
  schema: scatter(Tensor data, int dim, Tensor indices, Tensor updates, str? reduce=None) -> Tensor y
