operator:
  name: MLA
  category: FusedComposite
  difficulty: L4
  formula: |
    Q = concat(Q_nope, Q_rope)   dim: d_nope + d_rope
    K = concat(K_nope, K_rope)   dim: d_nope + d_rope
    y = softmax(Q @ K^T * scaleValue) @ V
  description: 多头潜在注意力 (Multi-Head Latent Attention)，Q 和 K 均分为 nope/rope 两部分拼接，V 与 K_nope 共享 d_nope 维度，支持 BSND/BNSD layout
  shape_support: "BSND: q_nope/v [B, S, N, d_nope]，q_rope [B, S, N, d_rope]，k_nope [B, S_kv, N_kv, d_nope]，k_rope [B, S_kv, N_kv, d_rope]；BNSD 对应交换 S 和 N 维度"
  attrs:
  - name: numKVHeads
    type: int
    default: 1
    description: KV 头数
    required: true
  - name: scaleValue
    type: float
    default: -1.0
    description: 缩放因子，<=0 时自动使用 1/sqrt(d_nope + d_rope)
    required: false
  - name: inputLayout
    type: str
    default: "BSND"
    description: 输入输出 layout，"BSND" 或 "BNSD"
    required: false
  inputs:
  - name: q_nope
    description: query 的 nope 部分
    dtype:
    - float16
    - float32
    - bfloat16
    shape: "BSND: [B, S, N_q, d_nope]；BNSD: [B, N_q, S, d_nope]"
  - name: q_rope
    description: query 的 rope 部分
    dtype:
    - float16
    - float32
    - bfloat16
    shape: "BSND: [B, S, N_q, d_rope]；BNSD: [B, N_q, S, d_rope]"
  - name: k_nope
    description: key 的 nope 部分
    dtype:
    - float16
    - float32
    - bfloat16
    shape: "BSND: [B, S_kv, N_kv, d_nope]；BNSD: [B, N_kv, S_kv, d_nope]"
  - name: k_rope
    description: key 的 rope 部分
    dtype:
    - float16
    - float32
    - bfloat16
    shape: "BSND: [B, S_kv, N_kv, d_rope]；BNSD: [B, N_kv, S_kv, d_rope]"
  - name: v
    description: 值张量，与 K_nope 共享 d_nope 维度
    dtype:
    - float16
    - float32
    - bfloat16
    shape: "BSND: [B, S_kv, N_kv, d_nope]；BNSD: [B, N_kv, S_kv, d_nope]"
  outputs:
  - name: y
    description: 注意力输出张量，head dim 为 d_nope
    dtype:
    - float16
    - float32
    - bfloat16
    shape: "BSND: [B, S, N_q, d_nope]；BNSD: [B, N_q, S, d_nope]"
  schema: mla(Tensor q_nope, Tensor q_rope, Tensor k_nope, Tensor k_rope, Tensor v, int numKVHeads=1, float scaleValue=-1.0, str inputLayout="BSND") -> Tensor y
