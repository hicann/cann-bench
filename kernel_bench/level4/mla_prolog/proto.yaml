operator:
  name: MlaProlog
  category: FusedComposite
  difficulty: L4
  formula: |
    Query: c_q = RMSNorm(x @ W_DQ, γ_cq, ε_cq)
           q_c, q_r_raw = split(c_q @ W_UQ_QR)
           query = q_c @ W_UK (per-head)
           query_rope = RoPE(q_r_raw, cos, sin)
    Key:   c_kv_raw, k_r_raw = split(x @ W_DKV_KR)
           c_kv = RMSNorm(c_kv_raw, γ_ckv, ε_ckv)
           k_rope = RoPE(k_r_raw, cos, sin)
  description: Multi-Head Latent Attention 前处理算子，融合 Query/Key 投影、RMSNorm 和 RoPE
  shape_support: "token_x [B, S, He]，输出 4 个张量"
  attrs:
  - name: n_heads
    type: int
    description: 注意力头数 N
    required: true
  - name: rmsnorm_epsilon_cq
    type: float
    default: 1e-5
    description: Query 路径 RMSNorm 的 epsilon
    required: false
  - name: rmsnorm_epsilon_ckv
    type: float
    default: 1e-5
    description: Key 路径 RMSNorm 的 epsilon
    required: false
  inputs:
  - name: token_x
    description: 输入 hidden states
    dtype:
    - bfloat16
    shape: "[B, S, He]"
  - name: w_dq
    description: Query 下投影权重 W^DQ
    dtype:
    - bfloat16
    shape: "[He, Hcq]"
  - name: w_uq_qr
    description: Query 上投影 + RoPE 权重（W^UQ 和 W^QR 合并）
    dtype:
    - bfloat16
    shape: "[Hcq, N*(D+Dr)]"
  - name: w_uk
    description: Key 上投影权重 W^UK（吸收到 Query 侧）
    dtype:
    - bfloat16
    shape: "[N, D, Hckv]"
  - name: w_dkv_kr
    description: KV 下投影 + Key RoPE 权重（W^DKV 和 W^KR 合并）
    dtype:
    - bfloat16
    shape: "[He, Hckv+Dr]"
  - name: rmsnorm_gamma_cq
    description: Query 路径 RMSNorm 缩放参数 γ
    dtype:
    - bfloat16
    shape: "[Hcq]"
  - name: rmsnorm_gamma_ckv
    description: Key 路径 RMSNorm 缩放参数 γ
    dtype:
    - bfloat16
    shape: "[Hckv]"
  - name: rope_sin
    description: RoPE 正弦值（已按位置索引）
    dtype:
    - bfloat16
    shape: "[B, S, Dr]"
  - name: rope_cos
    description: RoPE 余弦值（已按位置索引）
    dtype:
    - bfloat16
    shape: "[B, S, Dr]"
  outputs:
  - name: query
    description: 吸收 W_UK 后的 Query
    dtype:
    - bfloat16
    shape: "[B, S, N, Hckv]"
  - name: query_rope
    description: Query 位置编码
    dtype:
    - bfloat16
    shape: "[B, S, N, Dr]"
  - name: c_kv
    description: 归一化后的压缩 KV
    dtype:
    - bfloat16
    shape: "[B, S, Hckv]"
  - name: k_rope
    description: Key 位置编码
    dtype:
    - bfloat16
    shape: "[B, S, Dr]"
  schema: mla_prolog(Tensor token_x, Tensor w_dq, Tensor w_uq_qr, Tensor w_uk, Tensor w_dkv_kr, Tensor rmsnorm_gamma_cq, Tensor rmsnorm_gamma_ckv, Tensor rope_sin, Tensor rope_cos, int n_heads, float rmsnorm_epsilon_cq=1e-5, float rmsnorm_epsilon_ckv=1e-5) -> (Tensor query, Tensor query_rope, Tensor c_kv, Tensor k_rope)
