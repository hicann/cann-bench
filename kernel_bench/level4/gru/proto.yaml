operator:
  name: GRU
  category: FusedComposite
  difficulty: L4
  formula: |
    z_t = σ(W_z @ x_t + U_z @ h_{t-1} + b_z)
    r_t = σ(W_r @ x_t + U_r @ h_{t-1} + b_r)
    n_t = tanh(W_n @ x_t + r_t ⊙ (U_n @ h_{t-1} + b_n))
    h_t = (1 - z_t) ⊙ n_t + z_t ⊙ h_{t-1}
  description: Gated Recurrent Unit 循环神经网络
  shape_support: 'x: (S, B, input_size), h0: (num_layers * num_directions, B, hidden_size)'
  # GRU 包含 sigmoid/tanh 等非线性操作，累积误差较大，需放宽阈值
  # 多层 GRU 累积误差更大，需要更高的阈值
  # MARE 阈值 = 10 * threshold，所以 threshold=0.05 时 MARE 阈值=0.5
  precision_thresholds:
    float32: 0.05    # ≈ 2^-4.3, MARE 阈值 = 0.5
    float16: 0.05    # ≈ 2^-4.3, MARE 阈值 = 0.5
    bfloat16: 0.05   # ≈ 2^-4.3, MARE 阈值 = 0.5
  attrs:
  - name: inputSize
    type: int
    description: 输入特征维度
    required: true
  - name: hiddenSize
    type: int
    description: 隐藏状态特征维度
    required: true
  - name: numLayers
    type: int
    default: 1
    description: 循环层数
    required: false
  - name: bias
    type: bool
    default: true
    description: 是否使用偏置
    required: false
  - name: batchFirst
    type: bool
    default: false
    description: 输入是否为 (batch, seq, feature) 格式
    required: false
  - name: dropout
    type: float
    default: 0.0
    description: Dropout 概率
    required: false
  - name: bidirectional
    type: bool
    default: false
    description: 是否双向 GRU
    required: false
  inputs:
  - name: x
    description: 输入序列张量，shape 为 (S, B, input_size) 或 (B, S, input_size) if batch_first
    dtype:
    - float32
    - float16
    - bfloat16
  - name: weight_ih
    description: |
      输入到隐藏层权重列表（TensorList），每层/每个方向独立 tensor:
      - 单向 numLayers=1: [weight_ih_l0], shape=(3*hiddenSize, inputSize)
      - 双向 numLayers=1: [weight_ih_l0, weight_ih_l0_reverse], 每个 shape=(3*hiddenSize, inputSize)
      - 单向 numLayers=2: [weight_ih_l0, weight_ih_l1], shape 分别为 (3*hiddenSize, inputSize), (3*hiddenSize, hiddenSize)
      - 双向 numLayers=2: [weight_ih_l0, weight_ih_l0_reverse, weight_ih_l1, weight_ih_l1_reverse]
      列表长度 = numLayers * num_directions
    dtype:
    - float32
    - float16
    - bfloat16
  - name: weight_hh
    description: |
      隐藏层到隐藏层权重列表（TensorList），每层/每个方向独立 tensor:
      - 每个 tensor shape: (3*hiddenSize, hiddenSize)
      列表长度 = numLayers * num_directions
    dtype:
    - float32
    - float16
    - bfloat16
  - name: bias_ih
    description: "输入到隐藏层偏置列表（可选），每个 tensor shape: (3*hiddenSize)，列表长度 = numLayers * num_directions"
    dtype:
    - float32
    - float16
    - bfloat16
    optional: true
  - name: bias_hh
    description: "隐藏层到隐藏层偏置列表（可选），每个 tensor shape: (3*hiddenSize)，列表长度 = numLayers * num_directions"
    dtype:
    - float32
    - float16
    - bfloat16
    optional: true
  - name: h0
    description: 初始隐藏状态 (可选，默认全 0)，shape 为 (num_layers * num_directions, B, hidden_size)
    dtype:
    - float32
    - float16
    - bfloat16
    optional: true
  outputs:
  - name: y
    description: 输出序列 (S, B, num_directions * hiddenSize) 或 (B, S, num_directions * hiddenSize)
    dtype:
    - float32
    - float16
    - bfloat16
  - name: hn
    description: 最终隐藏状态 (num_layers * num_directions, B, hiddenSize)
    dtype:
    - float32
    - float16
    - bfloat16
  schema: gru(Tensor x, Tensor[] weight_ih, Tensor[] weight_hh, int inputSize, int hiddenSize, int numLayers, bool bias=True, bool batchFirst=False, float dropout=0.0, bool bidirectional=False, Tensor[]? bias_ih=None, Tensor[]? bias_hh=None, Tensor? h0=None) -> (Tensor y, Tensor hn)