operator:
  name: SparseFlashAttention
  category: FusedComposite
  difficulty: L4
  formula: |
    K_sel, V_sel = gather(K, V, sparseIndices)  # 按 KV 头组稀疏索引提取
    K_sel, V_sel = repeat(K_sel, V_sel, G)      # GQA 扩展到 N1 个 query 头
    y = softmax(Q @ K_sel^T * scaleValue) @ V_sel
  description: 稀疏注意力算子，支持 GQA（N1 != N2）、不同 head dim（Dk != Dv）和 BSND/BNSD 布局
  shape_support: "BSND: query [B,S1,N1,Dk], key [B,S2,N2,Dk], value [B,S2,N2,Dv], sparseIndices [B,S1,N2,topK]; BNSD: 对应 permute"
  attrs:
  - name: scaleValue
    type: float
    description: 缩放因子，通常为 1/sqrt(Dk)
    required: true
  - name: inputLayout
    type: str
    default: "BSND"
    description: 张量布局格式，"BSND" 或 "BNSD"，所有张量（含 sparseIndices 和输出）的布局保持一致
    required: false
  inputs:
  - name: query
    description: 查询张量
    dtype:
    - float16
    - bfloat16
    shape: "BSND: [B, S1, N1, Dk]; BNSD: [B, N1, S1, Dk]"
  - name: key
    description: 键张量，head dim 与 query 一致
    dtype:
    - float16
    - bfloat16
    shape: "BSND: [B, S2, N2, Dk]; BNSD: [B, N2, S2, Dk]"
  - name: value
    description: 值张量，head dim 可与 key 不同
    dtype:
    - float16
    - bfloat16
    shape: "BSND: [B, S2, N2, Dv]; BNSD: [B, N2, S2, Dv]"
  - name: sparseIndices
    description: 按 KV 头分组的稀疏索引，同组内 N1/N2 个 query 头共享，前三维布局与 inputLayout 一致
    dtype:
    - int32
    shape: "BSND: [B, S1, N2, topK]; BNSD: [B, N2, S1, topK]"
  outputs:
  - name: y
    description: 稀疏注意力计算输出张量，布局与输入一致
    dtype:
    - float16
    - bfloat16
    shape: "BSND: [B, S1, N1, Dv]; BNSD: [B, N1, S1, Dv]"
  schema: sparse_flash_attention(Tensor query, Tensor key, Tensor value, Tensor sparseIndices, float scaleValue, str inputLayout="BSND") -> Tensor y
