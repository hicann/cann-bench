operator:
  name: AdaptiveAvgPool3D
  category: Reduction
  difficulty: L3
  formula: y = adaptive_avg_pool3d(x, output_size)
  description: 完成输入张量的3D自适应平均池化计算
  shape_support: 输入[N, C, D, H, W] 5维张量
  attrs:
  - name: output_size
    type: List[int]
    description: 输出尺寸，格式为 [output_d, output_h, output_w]
    required: true
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float32
    - float16
    - bfloat16
  outputs:
  - name: y
    description: 输出张量，池化结果
    dtype:
    - float32
    - float16
    - bfloat16
  schema: adaptive_avg_pool3_d(Tensor x, list[int] output_size) -> Tensor y
