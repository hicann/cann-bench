cases:
# ========== 基础场景：完整参数，带 per_token_scales ==========
# 小规模测试：tokens_num=1024, rank=8, expert=8
- operator: MoeReRouting
  case_id: 1
  input_shape:
  - [1024, 512]    # tokens (A, H)
  - [8, 8]         # expert_token_num_per_rank (N, E)
  - [1024]         # per_token_scales (A)
  dtype: [float16, int32, float32]
  attrs: {expert_token_num_type: 1, idx_type: 0}
  value_range:
  - [-1, 1]
  - [1, 128]       # expert_token_num_per_rank 元素范围
  - [-1, 1]
  baseline_perf_us: null
  t_hw_us: 0.55
  note: S-float16-完整参数-带scales-rank8-expert8-H512

