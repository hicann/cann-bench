operator:
  name: MoeReRouting
  category: LayoutTransform
  difficulty: L3
  formula: |
    SrcOffset = Σ_{i=0}^{cur_rank} (Σ_{j=0}^{cur_expert} expert_token_num_per_rank(i,j))
    DstOffset = Σ_{j=0}^{cur_expert} (Σ_{i=0}^{cur_rank} expert_token_num_per_rank(i,j))
    permute_tokens[DstOffset+k] = tokens[SrcOffset+k]
  description: MoE 网络中，进行 AlltoAll 操作从其他卡上拿到需要算的 token 后，将 token 按照专家顺序重新排列
  shape_support: 'tokens: (A, H); expert_token_num_per_rank: (N, E); Sum(expert_token_num_per_rank)=A'
  attrs:
  - name: expert_token_num_type
    type: int
    default: "1"
    description: 输出 expert_token_num 的模式。0=cumsum 模式，1=count 模式。当前只支持为 1
  - name: idx_type
    type: int
    default: "0"
    description: 输出 permute_token_idx 的索引类型。0=gather 索引，1=scatter 索引。当前只支持为 0
  inputs:
  - name: tokens
    description: 待重新排布的 token，shape 为 (A, H)，A 为 token 数量，H 为 token 长度
    dtype:
    - float16
    - bfloat16
    - int8
    shape: '(A, H)'
  - name: expert_token_num_per_rank
    description: 每张卡上各个专家处理的 token 数，矩阵元素 [i,j] 表示从卡 i 获取的专家 j 处理的 token 数。shape 为 (N, E)，元素必须大于 0，所有元素之和必须等于 A
    dtype:
    - int32
    - int64
    shape: '(N, E)'
  - name: per_token_scales
    description: 每个 token 对应的 scale，需要随 token 同样进行重新排布。shape 为 (A)，dtype 为 float32
    dtype:
    - float32
    shape: '(A)'
    optional: true
  outputs:
  - name: permute_tokens
    description: 重新排布后的 token，shape 为 (A, H)，dtype 与 tokens 相同
    dtype:
    - float16
    - bfloat16
    - int8
    shape: '(A, H)'
  - name: permute_per_token_scales
    description: 重新排布后的 per_token_scales。输入不携带 per_token_scales 时该输出无效。shape 为 (A)，dtype 为 float32
    dtype:
    - float32
    shape: '(A)'
  - name: permute_token_idx
    description: 每个 token 在原排布方式的索引。shape 为 (A)，dtype 为 int32
    dtype:
    - int32
    shape: '(A)'
  - name: expert_token_num
    description: 每个专家处理的 token 数（按 count 模式，即 expert_token_num_per_rank 沿 rank 方向求和）。shape 为 (E)，dtype 与 expert_token_num_per_rank 相同
    dtype:
    - int32
    - int64
    shape: '(E)'
  schema: moe_re_routing(Tensor tokens, Tensor expert_token_num_per_rank, Tensor? per_token_scales=None, int expert_token_num_type=1, int idx_type=0) -> (Tensor permute_tokens, Tensor permute_per_token_scales, Tensor permute_token_idx, Tensor expert_token_num)