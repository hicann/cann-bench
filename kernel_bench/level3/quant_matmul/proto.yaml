operator:
  name: QuantMatmul
  category: Contraction
  difficulty: L3
  formula: |
    无bias: out = x1 @ x2 * scale + offset
    int32 bias: out = (x1 @ x2 + bias) * scale + offset
    浮点 bias (无offset): out = x1 @ x2 * scale + bias
  description: 量化矩阵乘法算子，int8/int4输入，支持per-tensor/per-channel/per-group/per-token量化
  shape_support: 'x1: [..., m, k]; x2: [..., k, n]; scale: [t] 或 2D; 输出: [..., m, n]'
  attrs:
  - name: output_dtype
    type: string
    default: null
    description: 输出数据类型，取值 "int8"（默认）, "float16", "bfloat16", "int32"
    required: false
  - name: group_sizes
    type: int[]
    default: "null"
    description: 分组量化粒度 [group_m, group_n, group_k]，取值范围 [0, 65535]
    required: false
  inputs:
  - name: x1
    description: 左矩阵，int8或int32（int32表示int4，每个存放8个int4）
    dtype:
    - int8
    - int32
    shape: '[..., m, k]，2-6维'
  - name: x2
    description: 右矩阵，与x1 dtype一致
    dtype:
    - int8
    - int32
    shape: '[..., k, n]，最后一维≤65535'
  - name: scale
    description: 量化缩放因子，per-tensor[t=1]或per-channel[t=n]，或2D分组量化
    dtype:
    - float32
    - int64
    - bfloat16
    shape: '[t] 或 [ceil(k/group_k), n]'
  - name: offset
    description: 反量化偏移，scale为2D时必选
    dtype:
    - float32
    - float16
    shape: '[t] 或与scale相同的2D'
    optional: true
  - name: pertoken_scale
    description: per-token缩放因子，shape=[m]
    dtype:
    - float32
    shape: '[m]'
    optional: true
  - name: bias
    description: 偏置项，int32走pre-scale，浮点走post-scale
    dtype:
    - int32
    - bfloat16
    - float16
    - float32
    shape: '[n] 或 [1, n] 或 [batch, 1, n]'
    optional: true
  outputs:
  - name: out
    description: 计算结果
    dtype:
    - int8
    - float16
    - bfloat16
    - int32
    shape: '[..., m, n]'
  schema: quant_matmul(Tensor x1, Tensor x2, Tensor scale, *, Tensor? offset=None, Tensor? pertoken_scale=None, Tensor? bias=None, str? output_dtype=None, int[]? group_sizes=None) -> Tensor out