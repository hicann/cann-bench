operator:
  name: TopK
  category: SortSelect
  difficulty: L3
  formula: y, idx = topk(x, k, dim)
  description: 返回k个最大或最小的元素及其索引
  shape_support: 输入1-8维
  attrs:
  - name: k
    type: int64
    description: '返回的topk数量 (取值范围: 1 <= k <= dim_size)'
    required: true
  - name: dim
    type: int64
    description: '排序维度 (取值范围: -ndim ~ ndim-1)'
    required: true
  - name: largest
    type: bool
    default: true
    description: 是否返回最大值 (false时返回最小值)
    required: false
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - int8
    - uint8
    - int32
    - int64
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 输出张量，topk值
    dtype:
    - int8
    - uint8
    - int32
    - int64
    - float16
    - float32
    - bfloat16
  - name: idx
    description: 输出索引张量，始终为 int64 类型
    dtype:
    - int64
  schema: top_k(Tensor x, int k, int dim, bool largest) -> (Tensor y, Tensor idx)
