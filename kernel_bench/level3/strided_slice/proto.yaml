operator:
  name: StridedSlice
  category: LayoutTransform
  difficulty: L3
  formula: y[i,j,k,...] = x[begin[i]:end[i]:strides[i], begin[j]:end[j]:strides[j],
    begin[k]:end[k]:strides[k], ...]
  description: 使用步长对输入张量进行多维切片，提取子张量。支持begin_mask、end_mask控制边界、shrink_axis_mask收缩维度、new_axis_mask插入新维度、ellipsis_mask省略号等功能
  shape_support: 输入维度0-8维
  attrs:
  - name: begin
    type: int[]
    description: 切片起始位置数组，长度等于输入维度数
    required: true
  - name: end
    type: int[]
    description: 切片结束位置数组，长度等于输入维度数
    required: true
  - name: strides
    type: int[]
    description: 切片步长数组，长度等于输入维度数，支持负数步长
    required: true
  - name: begin_mask
    type: int64_t
    description: begin_mask为二进制掩码，位1表示该维度从0开始，位0使用begin值
  - name: end_mask
    type: int64_t
    description: end_mask为二进制掩码，位1表示该维度切到末尾，位0使用end值
  - name: ellipsis_mask
    type: int64_t
    description: ellipsis_mask为二进制掩码，位1表示该维度使用省略号标记
  - name: shrink_axis_mask
    type: int64_t
    description: shrink_axis_mask为二进制掩码，位1表示该维度被收缩掉（维度大小为1）
  - name: new_axis_mask
    type: int64_t
    description: new_axis_mask为二进制掩码，位1表示该位置插入大小为1的新维度
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - int8
    - uint8
    - int32
    - int64
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 输出张量，切片结果
    dtype:
    - int8
    - uint8
    - int32
    - int64
    - float16
    - float32
    - bfloat16
  schema: strided_slice(Tensor x, int[] begin, int[] end, int[] strides, int begin_mask,
    int end_mask, int ellipsis_mask, int shrink_axis_mask, int new_axis_mask) -> Tensor
    y
