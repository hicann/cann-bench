operator:
  name: Conv3DBackpropFilter
  category: Contraction
  difficulty: L4
  formula: y = conv3d_filter_grad(x, grad, filter_size)
  description: Conv3D的filter梯度
  shape_support: 'x: [N, C_in, D, H, W], grad: [N, C_out, D_out, H_out, W_out], filter_size: [C_out, C_in, K_d, K_h, K_w]'
  attrs:
  - name: strides
    type: ListInt
    description: 步长
    required: true
  - name: pads
    type: ListInt
    description: 填充，6元素格式 [D_front, D_back, H_top, H_bottom, W_left, W_right]
    required: true
  - name: dilations
    type: ListInt
    description: 膨胀率
    required: true
  - name: groups
    type: Int
    default: 1
    description: 分组数
    required: false
  - name: filter_size
    type: ListInt
    description: filter的shape [C_out, C_in/groups, K_d, K_h, K_w]
    required: true
  inputs:
  - name: x
    description: 输入特征图，shape为[N, C_in, D, H, W]
    dtype:
    - float16
    - bfloat16
    - float32
  - name: grad
    description: 输出梯度，shape为[N, C_out, D_out, H_out, W_out]
    dtype:
    - float16
    - bfloat16
    - float32
  outputs:
  - name: y
    description: filter梯度
    dtype:
    - float16
    - bfloat16
    - float32
  schema: conv3_d_backprop_filter(Tensor x, Tensor grad, int[] strides, int[] pads,
    int[] dilations, int groups, int[] filter_size) -> Tensor y
