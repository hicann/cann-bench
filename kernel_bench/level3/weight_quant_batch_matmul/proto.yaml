operator:
  name: WeightQuantBatchMatmul
  category: Contraction
  difficulty: L3
  formula: 'y = x @ ANTIQUANT(weight) + bias, ANTIQUANT(weight) = (weight + antiquantOffset) * antiquantScale'
  description: 权重量化批量矩阵乘法算子，支持权重的反量化计算
  shape_support: 'x: [M, K], weight: [K, N], antiquantScale: [N], y: [M, N]'
  attrs:
  inputs:
  - name: x
    description: 左输入矩阵，shape 为 [M, K]
    dtype:
    - float16
    - bfloat16
  - name: weight
    description: 右输入矩阵（量化权重），shape 为 [K, N]
    dtype:
    - int8
    - int4
  - name: antiquantScale
    description: 反量化scale参数，shape 为 [N] 或 [1, N]
    dtype:
    - float16
    - bfloat16
  - name: antiquantOffset
    description: 反量化offset参数（可选），shape 与 antiquantScale 相同
    dtype:
    - float16
    - bfloat16
    optional: true
  - name: bias
    description: 偏置张量（可选），shape 为 [N] 或 [1, N]
    dtype:
    - float16
    - bfloat16
    optional: true
  outputs:
  - name: y
    description: 输出张量，shape 为 [M, N]
    dtype:
    - float16
    - bfloat16
  schema: weight_quant_batch_matmul(Tensor x, Tensor weight, Tensor antiquantScale, Tensor? antiquantOffset=None, Tensor? bias=None) -> Tensor y