operator:
  name: Conv2D
  category: Contraction
  difficulty: L4
  formula: y = CONV(x, filter) + bias
  description: 计算2D卷积
  shape_support: 'x: [N, C_in, H, W], filter: [C_out, C_in, K_h, K_w]'
  attrs:
  - name: strides
    type: ListInt
    description: 步长
    required: true
  - name: pads
    type: ListInt
    description: 填充
    required: true
  - name: dilations
    type: ListInt
    default:
    - 1
    - 1
    description: 膨胀率
    required: false
  - name: groups
    type: Int
    default: 1
    description: 分组数
    required: false
  inputs:
  - name: x
    description: 输入特征图
    dtype:
    - float16
    - float32
    - bfloat16
  - name: filter
    description: 卷积核
    dtype:
    - float16
    - float32
    - bfloat16
  - name: bias
    description: 偏置
    dtype:
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 输出特征图
    dtype:
    - float16
    - float32
    - bfloat16
  schema: conv2_d(Tensor x, Tensor filter, Tensor bias, int[] strides, int[] pads,
    int[] dilations, int groups) -> Tensor y
