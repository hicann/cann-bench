operator:
  name: MoeFinalizeRouting
  category: FusedComposite
  difficulty: L3
  formula: 'out(i,j) = skip1_{i,j} + skip2_{i,j} + Σ_{k=0}^{K}(scales_{i,k} * (expanded_permuted_rows_{expanded_src_to_dst_row_{...},j} + bias_{expertid,j}))'
  description: 在 MoE 计算的最后，合并 MoE FFN 的输出结果，支持共享专家残差连接和专家级偏置
  shape_support: 'expanded_permuted_rows: (NUM_ROWS * K, H) 或 (E, C, H); skip1/skip2: (NUM_ROWS, H); bias: (E, H); scales: (NUM_ROWS, K)'
  attrs:
  - name: drop_pad_mode
    type: int
    default: "0"
    description: 模式选择，取值范围 [0, 3]。0: drop less 按列排列; 1: drop pad 按列排列; 2: drop less 按行排列; 3: drop pad 按行排列
  inputs:
  - name: expanded_permuted_rows
    description: MoE FFN 输出，经过专家处理的结果。drop_pad_mode=0/2 时 shape 为 (NUM_ROWS * K, H)，drop_pad_mode=1/3 时 shape 为 (E, C, H)
    dtype:
    - float32
    - float16
    - bfloat16
    shape: '(NUM_ROWS * K, H) 或 (E, C, H)'
  - name: skip1
    description: 共享专家1，残差连接。shape 为 (NUM_ROWS, H)，dtype 与 expanded_permuted_rows 一致
    dtype:
    - float32
    - float16
    - bfloat16
    optional: true
  - name: skip2
    description: 共享专家2，残差连接。shape 为 (NUM_ROWS, H)，dtype 与 expanded_permuted_rows 一致。skip1 为 None 时，skip2 必须也为 None
    dtype:
    - float32
    - float16
    - bfloat16
    optional: true
  - name: bias
    description: 专家偏置。shape 为 (E, H)，dtype 与 expanded_permuted_rows 一致。bias 存在时，expert_for_source_row 必须同时存在
    dtype:
    - float32
    - float16
    - bfloat16
    optional: true
  - name: scales
    description: 路由权重，专家缩放因子。shape 为 (NUM_ROWS, K)，dtype 与 expanded_permuted_rows 一致。scales 不存在时，K 默认为 1
    dtype:
    - float32
    - float16
    - bfloat16
    optional: true
  - name: expanded_src_to_dst_row
    description: 行索引映射，保存每个专家处理结果的索引。shape 为 (NUM_ROWS * K)，dtype 为 int32。drop_pad_mode=0/2 时取值范围 [0, NUM_ROWS * K - 1]，drop_pad_mode=1/3 时取值范围 [-1, E * C - 1]
    dtype:
    - int32
    shape: '(NUM_ROWS * K)'
  - name: expert_for_source_row
    description: 专家索引，每行处理的专家号。shape 为 (NUM_ROWS, K)，dtype 为 int32，取值范围 [0, E - 1]
    dtype:
    - int32
    optional: true
  outputs:
  - name: out
    description: 输出张量，MoE FFN 合并的输出结果。shape 为 (NUM_ROWS, H)，dtype 与 expanded_permuted_rows 一致
    dtype:
    - float32
    - float16
    - bfloat16
  schema: moe_finalize_routing(Tensor expanded_permuted_rows, Tensor? skip1=None, Tensor? skip2=None, Tensor? bias=None, Tensor? scales=None, Tensor expanded_src_to_dst_row, Tensor? expert_for_source_row=None, int drop_pad_mode=0) -> Tensor out