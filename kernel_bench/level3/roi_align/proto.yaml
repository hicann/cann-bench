operator:
  name: ROIAlign
  category: FusedComposite
  difficulty: L3
  formula: y = roi_align(x, boxes, output_size)
  description: 池化层，用于非均匀输入尺寸的特征图
  shape_support: 'self: [B, C, H, W], boxes: [numBoxes, 5]'
  attrs:
  - name: outputHeight
    type: int
    description: 输出高度
    required: true
  - name: outputWidth
    type: int
    description: 输出宽度
    required: true
  - name: spatial_scale
    type: float
    description: 空间缩放因子 (用于将 boxes 坐标映射到输入特征图尺寸)
    required: true
  - name: sampling_ratio
    type: int
    default: -1
    description: 采样比率
    required: false
  - name: aligned
    type: bool
    default: false
    description: 是否对齐
    required: false
  inputs:
  - name: x
    description: 输入特征图
    dtype:
    - float32
    - float16
  - name: boxes
    description: ROI 框 [numBoxes, 5] (batch_idx, x1, y1, x2, y2)
    dtype:
    - float32
    - float16
  outputs:
  - name: y
    description: 输出张量，ROI 对齐结果
    dtype:
    - float32
    - float16
  schema: roi_align(Tensor x, Tensor boxes, int outputHeight, int outputWidth,
    float spatial_scale, int sampling_ratio, bool aligned) -> Tensor y
