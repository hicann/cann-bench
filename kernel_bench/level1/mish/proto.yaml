operator:
  name: Mish
  category: Elementwise
  difficulty: L1
  formula: y = x * tanh(softplus(x))
  description: 自正则化的非单调神经网络激活函数
  shape_support: 输入0-8维
  attrs: []
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 输出张量，Mish激活结果
    dtype:
    - float16
    - float32
    - bfloat16
  schema: mish(Tensor x) -> Tensor y
