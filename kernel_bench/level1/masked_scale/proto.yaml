operator:
  name: MaskedScale
  category: MaskPredicate
  difficulty: L1
  formula: y = x * mask * scale
  description: 对输入张量进行掩码缩放，支持x和mask的不同数据类型组合
  shape_support: 输入x、mask、输出y的shape需一致
  attrs:
  - name: scale
    type: float
    default: 1.0
    description: 缩放因子
    required: false
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - bfloat16
    - float32
  - name: mask
    description: 掩码张量
    dtype:
    - int8
    - uint8
    - float16
    - float32
  outputs:
  - name: y
    description: 掩码缩放结果
    dtype:
    - float16
    - bfloat16
    - float32
  schema: masked_scale(Tensor x, Tensor mask, float scale) -> Tensor y
