operator:
  name: Sigmoid
  category: Elementwise
  difficulty: L1
  formula: y = 1 / (1 + e^(-x))
  description: 对输入Tensor完成Sigmoid运算
  shape_support: 输入ND格式
  attrs: []
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float32
    - float16
    - bfloat16
  outputs:
  - name: y
    description: 输出张量，Sigmoid激活结果
    dtype:
    - float32
    - float16
    - bfloat16
  schema: sigmoid(Tensor x) -> Tensor y
