operator:
  name: SwiGlu
  category: Elementwise
  difficulty: L1
  formula: y = (x0 * sigmoid(beta * x0)) * x1
  description: 采用Swish作为激活函数的GLU变体，输入在第-1维拆分成x0和x1两部分
  shape_support: 单输入，在-1维拆分为两部分
  attrs:
  - name: scalarValue
    type: float
    description: Swish激活函数的beta参数
    required: true
  inputs:
  - name: x
    description: 输入张量，会在-1维拆分成x0和x1
    dtype:
    - float16
    - float32
  outputs:
  - name: y
    description: 输出张量，形状为输入shape除以2
    dtype:
    - float16
    - float32
  schema: swi_glu(Tensor x, float scalarValue) -> Tensor y
