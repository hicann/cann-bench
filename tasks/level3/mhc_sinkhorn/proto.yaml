operator:
  name: MhcSinkhorn
  category: VVFusion
  difficulty: L3
  formula: |
    Iter 1:   comb = softmax(comb, dim=-1) + eps;  comb = comb / (col_sum + eps)
    Iter 2..iter_step:  comb = comb / (row_sum + eps);  comb = comb / (col_sum + eps)
  description: |
    mHC (Manifold-Constrained Hyper-Connections) Sinkhorn 算子 — DeepSeek-V4
    内部 hyper-connection stream 混合矩阵的双随机化投影。linear-domain 实现：
    第 1 轮 row-softmax + eps 偏移并 column normalize，后续 iter_step-1 轮做
    交替 row / column 归一化收敛到 Birkhoff Polytope 流形（doubly-stochastic）。
    详见 arXiv:2512.24880。
  shape_support: 'comb: [B, hc_mult, hc_mult]，inner 两维必须相等 (方阵)；B ∈ [1, 16384]，hc_mult ∈ [2, 16]，DSv4 实际取 hc_mult=4；fp32 only'
  attrs:
  - name: iter_step
    type: int
    default: 20
    description: Sinkhorn 总迭代轮数 (1 ~ 40)；第 1 轮含 softmax，其余轮次为纯 row/col normalize。DSv4 production 默认 20
    required: false
  - name: eps
    type: float
    default: 1.0e-6
    description: 数值稳定项，所有除法分母上加该常量；fp32 下典型 1e-6 ~ 1e-8
    required: false
  inputs:
  - name: comb
    description: 输入 hyper-connection 混合矩阵，shape [B, hc_mult, hc_mult]，inner 两维必须相等，fp32 only
    dtype:
    - float32
    shape: '[B, hc_mult, hc_mult]'
  outputs:
  - name: comb_out
    description: Sinkhorn 迭代后的双随机方阵，shape 与输入完全一致 (fp32)
    dtype:
    - float32
    shape: '[B, hc_mult, hc_mult]'
  schema: mhc_sinkhorn(Tensor comb, int iter_step=20, float eps=1e-6) -> Tensor comb_out
