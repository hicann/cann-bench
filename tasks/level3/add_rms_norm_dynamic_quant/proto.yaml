operator:
  name: AddRmsNormDynamicQuant
  category: FusedComposite
  difficulty: L3
  formula: y, xOut, scaleOut = quantize(rmsnorm(x1 + x2) * gamma)
  description: Add、RMSNorm 和动态量化的融合
  shape_support: 'x1: ND 格式'
  attrs:
  - name: epsilon
    type: float
    default: 1e-6
    description: epsilon 值
    required: false
  inputs:
  - name: x1
    description: 第 1 个输入张量
    dtype:
    - float16
    - bfloat16
  - name: x2
    description: 第 2 个输入张量
    dtype:
    - float16
    - bfloat16
  - name: gamma
    description: 缩放参数
    dtype:
    - float16
    - bfloat16
  precision_thresholds:
    int8: 1
  outputs:
  - name: y
    description: 量化后的输出张量
    dtype:
    - int8
  - name: xOut
    description: Add 结果，x1 + x2
    dtype:
    - float16
    - bfloat16
  - name: scaleOut
    description: 每 token 反量化系数 (row_max(abs)/127)，shape = x1.shape[:-1]；下游 W8A8 / KV cache 反量化算子必需；与 level2/dynamic_quant 语义一致
    dtype:
    - float32
  schema: add_rms_norm_dynamic_quant(Tensor x1, Tensor x2, Tensor gamma, float epsilon) -> (Tensor y, Tensor xOut, Tensor scaleOut)
