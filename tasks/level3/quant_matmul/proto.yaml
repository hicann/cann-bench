operator:
  name: QuantMatmul
  category: Contraction
  difficulty: L3
  formula: |
    无bias: out = x1 @ x2 * scale
    int32 bias (pre-scale): out = (x1 @ x2 + bias) * scale
    浮点 bias (post-scale): out = x1 @ x2 * scale + bias
    pertoken: out = (x1 @ x2 * scale) * pertoken_scale
    offset (非对称量化): out = x1 @ x2 * scale + offset
  description: 量化矩阵乘法算子，int8 输入，float16/bfloat16 输出，支持 per-tensor/per-channel 量化
  shape_support: 'x1: [..., m, k]; x2: [..., k, n]; scale: [t]; 输出: [..., m, n]'
  attrs:
  - name: output_dtype
    type: string
    default: null
    description: 输出数据类型，取值 "float16"（默认）或 "bfloat16"
    required: false
  inputs:
  - name: x1
    description: 左矩阵，int8
    dtype:
    - int8
    shape: '[..., m, k]，2-6维'
  - name: x2
    description: 右矩阵，与 x1 dtype 一致
    dtype:
    - int8
    shape: '[..., k, n]，最后一维≤65535'
  - name: scale
    description: 量化缩放因子，per-tensor[t=1] 或 per-channel[t=n]
    dtype:
    - float32
    - bfloat16
    shape: '[t]'
  - name: offset
    description: 非对称量化偏移 (zero-point 校正)，反量化时 out += offset；per-tensor[t=1] 或 per-channel[t=n]
    dtype:
    - float32
    shape: '[t]'
    optional: true
  - name: pertoken_scale
    description: per-token 缩放因子，shape=[m]
    dtype:
    - float32
    shape: '[m]'
    optional: true
  - name: bias
    description: 偏置项，int32 走 pre-scale，浮点走 post-scale
    dtype:
    - int32
    - bfloat16
    - float16
    - float32
    shape: '[n] 或 [1, n] 或 [batch, 1, n]'
    optional: true
  outputs:
  - name: out
    description: 计算结果
    dtype:
    - float16
    - bfloat16
    shape: '[..., m, n]'
  schema: quant_matmul(Tensor x1, Tensor x2, Tensor scale, *, Tensor? offset=None, Tensor? pertoken_scale=None, Tensor? bias=None, str? output_dtype=None) -> Tensor out
