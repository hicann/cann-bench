cases:
# ========== 基础场景：int8 输入，无 bias/pertoken ==========
# 小规模 fp16 输出
- operator: QuantMatmul
  case_id: 1
  input_shape:
  - [1024, 3584]
  - [3584, 3584]
  - [3584]
  dtype: [int8, int8, float32]
  attrs: {pertoken_scale: null, bias: null, output_dtype: float16}
  value_range:
  - [-128, 127]
  - [-128, 127]
  - [0.001, 0.01]
  baseline_perf_us: 71.28
  t_hw_us: 37.16
  note: "Qwen2-7B-o_proj-fp16-per-channel | baseline_kernels: QuantBatchMatmulV3×1"

