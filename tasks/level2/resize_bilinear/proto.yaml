operator:
  name: ResizeBilinear
  category: FusedComposite
  difficulty: L2
  formula: y = resize_bilinear(x, size)
  description: 使用双线性插值调整 4D 图像 (N, C, H, W) 的空间维度大小
  shape_support: 'x: [N, C, H, W]（仅 4D）'
  attrs:
  - name: output_size
    type: ListInt
    description: 输出尺寸 [output_height, output_width]
    required: false
  - name: align_corners
    type: bool
    default: false
    description: 是否对齐角点
    required: false
  - name: scale_factor
    type: ListFloat
    description: 缩放因子 [scale_height, scale_width]，与 output_size 互斥
    required: false
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 输出张量，调整大小后的结果
    dtype:
    - float16
    - float32
    - bfloat16
  schema: resize_bilinear(Tensor x, int[]? output_size=None, bool align_corners=False, float[]? scale_factor=None) -> Tensor y
