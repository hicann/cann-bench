operator:
  name: ApplyRotaryPosEmb
  category: FusedComposite
  difficulty: L2
  formula: |
    rotate_half(x) = concat(-x[head_dim/2:], x[:head_dim/2])
    y = (x * cos) + (rotate_half(x) * sin)
  description: 对 query 和 key 执行旋转位置编码 (RoPE) 计算
  shape_support: |
    query: (batch_size, seq_len, num_heads, head_dim) 或 (batch_size, num_heads, seq_len, head_dim)
    key: 同 query
    cos: (seq_len, head_dim/2) 或 (batch_size, seq_len, head_dim/2)
    sin: (seq_len, head_dim/2) 或 (batch_size, seq_len, head_dim/2)
  attrs:
  - name: layout
    type: int
    default: 0
    description: '输入布局 (0: [B,S,N,D], 1: [B,N,S,D])'
    required: false
  - name: rotaryMode
    type: string
    default: 'half'
    description: '旋转模式 ("half": 连续半分式，"interleaved": 交错式)'
    required: false
  inputs:
  - name: query
    description: 查询张量
    dtype:
    - float32
    - float16
    - bfloat16
  - name: key
    description: 键张量
    dtype:
    - float32
    - float16
    - bfloat16
  - name: cos
    description: 余弦位置编码
    dtype:
    - float32
    - float16
    - bfloat16
  - name: sin
    description: 正弦位置编码
    dtype:
    - float32
    - float16
    - bfloat16
  outputs:
  - name: query_out
    description: 旋转后的查询张量
    dtype:
    - float32
    - float16
    - bfloat16
  - name: key_out
    description: 旋转后的键张量
    dtype:
    - float32
    - float16
    - bfloat16
  schema: apply_rotary_pos_emb(Tensor query, Tensor key, Tensor cos, Tensor sin, int layout=0, str rotaryMode="half") -> (Tensor query_out, Tensor key_out)
  # RoPE 算子涉及三角函数（cos/sin）和旋转计算
  # 极小值场景会导致相对误差放大，需要适当放宽阈值
  # 参考 ApplyAdamW 的阈值设置
  precision_thresholds:
    float32: 0.005   # MARE 阈值 = 0.05
    float16: 0.01    # MARE 阈值 = 0.1
    bfloat16: 0.01   # 与 float16 相同
