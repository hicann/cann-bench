operator:
  name: DynamicMxQuant
  category: Quantization
  difficulty: L3
  platform: Ascend 950PR / 950DT
  formula: |
    shared_exp = floor(log2(max(|V_i|))) - emax;
    mxscale = 2^shared_exp;
    y_i = cast(V_i / mxscale, round_mode)
  description: 对输入张量执行 Microscaling (MX) 动态量化，按 blocksize 分组计算共享指数，输出低精度量化结果和对应的量化 scale
  shape_support: 输入支持 1-7D 张量，输出 y 与输入同 shape，mxscale 为 rank(x)+1 维张量
  attrs:
  - name: axis
    type: int
    default: -1
    description: 量化轴，范围 [-rank, rank-1]
    required: false
  - name: round_mode
    type: str
    default: rint
    description: 舍入模式，支持 rint/floor/round
    required: false
  - name: dst_type
    type: int
    default: 40
    description: 输出量化类型编码，35=FP8_E5M2, 36=FP8_E4M3FN, 40=FP4_E2M1, 41=FP4_E1M2
    required: true
  - name: blocksize
    type: int
    default: 32
    description: 量化分组大小，32 的倍数且不超过 1024
    required: false
  - name: scale_alg
    type: int
    default: 0
    description: Scale 计算算法，0=基础共享指数, 1=FP8块缩放, 2=FP4自定义max
    required: false
  - name: dst_type_max
    type: float
    default: 0.0
    description: 自定义量化范围上限，仅 scale_alg=2 时有效，0.0 或 [6.0, 12.0]
    required: false
  inputs:
  - name: x
    description: 输入张量，1-7 维
    dtype:
    - float16
    - bfloat16
  outputs:
  - name: y
    description: 量化后的输出张量，与输入同 shape
    dtype:
    - float8_e5m2
    - float8_e4m3fn
    - float4_e2m1
    - float4_e1m2
  - name: mxscale
    description: 量化 scale 张量，dtype 为 FP8_E8M0，shape 为 rank(x)+1 维
    dtype:
    - float8_e8m0
  schema: dynamic_mx_quant(Tensor x, int axis=-1, str round_mode="rint", int dst_type=40, int blocksize=32, int scale_alg=0, float dst_type_max=0.0) -> (Tensor y, Tensor mxscale)
