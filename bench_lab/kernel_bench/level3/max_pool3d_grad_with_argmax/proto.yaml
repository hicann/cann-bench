operator:
  name: MaxPool3dGradWithArgmax
  category: Pooling
  difficulty: L3
  platform: Ascend 950PR / 950DT
  formula: |
    y = max_pool3d_with_indices_backward(grad, x, kernel_size=ksize, stride=strides, padding=pads,
                                         dilation=dilation, ceil_mode=ceil_mode, indices=argmax)
  description: MaxPool3dGradWithArgmax 算子用于计算 3D 最大池化前向的反向传播梯度，将梯度回填到正向最大值所在的输入坐标处。
  shape_support: |
    输入 x 为 5D NCDHW 张量；grad 与 argmax 的 shape 与正向输出一致；输出 y 的 shape 与 x 一致。
  attrs:
  - name: ksize
    type: int_list
    default: [1, 1, 1]
    description: 池化窗口大小 [kD, kH, kW]，长度 1 或 3。
    required: true
  - name: strides
    type: int_list
    default: [1, 1, 1]
    description: 池化步长 [sD, sH, sW]，长度 0、1 或 3。
    required: true
  - name: pads
    type: int_list
    default: [0, 0, 0]
    description: 在 D、H、W 方向上的补零层数 [pD, pH, pW]，长度 1 或 3。
    required: true
  - name: dilation
    type: int_list
    default: [1, 1, 1]
    description: 控制窗口中元素的步幅，长度 1 或 3，对应 [dD, dH, dW]；当前仅支持 1。
    required: false
  - name: ceil_mode
    type: bool
    default: false
    description: 计算输出形状时是否向上取整。
    required: false
  inputs:
  - name: x
    description: 正向输入 Tensor，对应正向的 self。
    dtype:
    - float16
    - float32
    - bfloat16
  - name: grad
    description: 正向输出的梯度 Tensor，对应公式中的 gradOutput。
    dtype:
    - float16
    - float32
    - bfloat16
  - name: argmax
    description: 正向输入中最大元素的索引位置 Tensor，对应公式中的 indices，shape 与 grad 一致。
    dtype:
    - int32
    - int64
  outputs:
  - name: y
    description: 输入 x 的梯度 Tensor，对应公式中的 gradInput。
    dtype:
    - float16
    - float32
    - bfloat16
  schema: max_pool3d_grad_with_argmax(Tensor x, Tensor grad, Tensor argmax, int[] ksize, int[] strides, int[] pads, int[] dilation=[1,1,1], bool ceil_mode=False) -> (Tensor y)
