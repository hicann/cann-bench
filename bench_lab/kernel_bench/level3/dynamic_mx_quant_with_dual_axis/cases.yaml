cases:
# ============================================================
# scale_alg=0 基础共享指数 - FP4_E2M1
# ============================================================
- operator: DynamicMxQuantWithDualAxis
  case_id: 1
  input_shape: [[1024, 1024]]
  dtype: [float16]
  attrs: {round_mode: rint, dst_type: 40, scale_alg: 0, dst_type_max: 0.0}
  value_range: [-1, 1]
  note: "alg0-FP4E2M1-fp16-2D-1M-对齐-小值域"
- operator: DynamicMxQuantWithDualAxis
  case_id: 2
  input_shape: [[4, 509, 2048]]
  dtype: [bfloat16]
  attrs: {round_mode: floor, dst_type: 40, scale_alg: 0, dst_type_max: 0.0}
  value_range: [-6, 6]
  note: "alg0-FP4E2M1-bf16-3D-4M-质数前维509-floor"
- operator: DynamicMxQuantWithDualAxis
  case_id: 3
  input_shape: [[3, 7, 127, 1022]]
  dtype: [float16]
  attrs: {round_mode: rint, dst_type: 40, scale_alg: 0, dst_type_max: 0.0}
  value_range: [-2, 2]
  note: "alg0-FP4E2M1-fp16-4D-2.7M-非对齐(127x1022)"
- operator: DynamicMxQuantWithDualAxis
  case_id: 4
  input_shape: [[16, 64, 16384]]
  dtype: [float16]
  attrs: {round_mode: rint, dst_type: 40, scale_alg: 0, dst_type_max: 0.0}
  value_range: [-3, 3]
  note: "alg0-FP4E2M1-fp16-3D-16M-大尾维16384"
# ============================================================
# scale_alg=0 基础共享指数 - FP4_E1M2
# ============================================================
- operator: DynamicMxQuantWithDualAxis
  case_id: 5
  input_shape: [[64, 8192]]
  dtype: [float16]
  attrs: {round_mode: rint, dst_type: 41, scale_alg: 0, dst_type_max: 0.0}
  value_range: [-1.5, 1.5]
  note: "alg0-FP4E1M2-fp16-2D-512K-大尾维8192"
- operator: DynamicMxQuantWithDualAxis
  case_id: 6
  input_shape: [[2, 3, 7, 11, 512]]
  dtype: [bfloat16]
  attrs: {round_mode: round, dst_type: 41, scale_alg: 0, dst_type_max: 0.0}
  value_range: [-1.5, 1.5]
  note: "alg0-FP4E1M2-bf16-5D-236K-质数前维(3x7x11)-round"
# ============================================================
# scale_alg=0 基础共享指数 - FP8_E4M3FN
# ============================================================
- operator: DynamicMxQuantWithDualAxis
  case_id: 7
  input_shape: [[32, 16384]]
  dtype: [float16]
  attrs: {round_mode: rint, dst_type: 36, scale_alg: 0, dst_type_max: 0.0}
  value_range: [-100, 100]
  note: "alg0-FP8E4M3-fp16-2D-512K-大尾维16384-对齐"
- operator: DynamicMxQuantWithDualAxis
  case_id: 8
  input_shape: [[2, 7, 13, 4097]]
  dtype: [bfloat16]
  attrs: {round_mode: rint, dst_type: 36, scale_alg: 0, dst_type_max: 0.0}
  value_range: [-200, 200]
  note: "alg0-FP8E4M3-bf16-4D-745K-非对齐尾维4097"
- operator: DynamicMxQuantWithDualAxis
  case_id: 9
  input_shape: [[2, 4, 8, 16, 2049]]
  dtype: [float16]
  attrs: {round_mode: rint, dst_type: 36, scale_alg: 0, dst_type_max: 0.0}
  value_range: [-50, 50]
  note: "alg0-FP8E4M3-fp16-5D-2M-非对齐尾维2049"
# ============================================================
# scale_alg=0 基础共享指数 - FP8_E5M2
# ============================================================
- operator: DynamicMxQuantWithDualAxis
  case_id: 10
  input_shape: [[256, 8193]]
  dtype: [bfloat16]
  attrs: {round_mode: rint, dst_type: 35, scale_alg: 0, dst_type_max: 0.0}
  value_range: [-500, 500]
  note: "alg0-FP8E5M2-bf16-2D-2M-尾维8193非对齐"
- operator: DynamicMxQuantWithDualAxis
  case_id: 11
  input_shape: [[3, 11, 509, 128]]
  dtype: [float16]
  attrs: {round_mode: rint, dst_type: 35, scale_alg: 0, dst_type_max: 0.0}
  value_range: [-1000, 1000]
  note: "alg0-FP8E5M2-fp16-4D-2.1M-质数非对齐"
