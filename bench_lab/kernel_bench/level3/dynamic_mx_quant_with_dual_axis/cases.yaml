  value_range: [-100, 100]
  note: "alg1-FP8E4M3-fp16-2D-2M-大尾维16384-对齐"
- operator: DynamicMxQuantWithDualAxis
  case_id: 13
  input_shape: [[4, 513, 4097]]
  dtype: [bfloat16]
  attrs: {round_mode: rint, dst_type: 35, scale_alg: 1, dst_type_max: 0.0}
  value_range: [-500, 500]
  note: "alg1-FP8E5M2-bf16-3D-8.4M-非对齐(513x4097)"
- operator: DynamicMxQuantWithDualAxis
  case_id: 14
  input_shape: [[1024, 2048]]
  dtype: [float16]
  attrs: {round_mode: rint, dst_type: 35, scale_alg: 1, dst_type_max: 0.0}
  value_range: [-1000, 1000]
  note: "alg1-FP8E5M2-fp16-2D-2M-极大值域"
- operator: DynamicMxQuantWithDualAxis
  case_id: 15
  input_shape: [[2, 3, 7, 64, 1024]]
  dtype: [bfloat16]
  attrs: {round_mode: rint, dst_type: 36, scale_alg: 1, dst_type_max: 0.0}
  value_range: [-200, 200]
  note: "alg1-FP8E4M3-bf16-5D-2.7M"
# ============================================================
# scale_alg=2 FP4自定义max（dst_type_max=0.0，使用默认上限）
# ============================================================
- operator: DynamicMxQuantWithDualAxis
  case_id: 16
  input_shape: [[512, 2048]]
  dtype: [float16]
  attrs: {round_mode: rint, dst_type: 40, scale_alg: 2, dst_type_max: 0.0}
  value_range: [-5, 5]
  note: "alg2-FP4E2M1-fp16-2D-1M-dstTypeMax=0.0"
- operator: DynamicMxQuantWithDualAxis
  case_id: 17
  input_shape: [[3, 7, 11, 1022]]
  dtype: [bfloat16]
  attrs: {round_mode: rint, dst_type: 40, scale_alg: 2, dst_type_max: 0.0}
  value_range: [-6, 6]
  note: "alg2-FP4E2M1-bf16-4D-236K-非对齐尾维1022"
- operator: DynamicMxQuantWithDualAxis
  case_id: 18
  input_shape: [[64, 128, 1024]]
  dtype: [float16]
  attrs: {round_mode: floor, dst_type: 40, scale_alg: 2, dst_type_max: 0.0}
  value_range: [-8, 8]
  note: "alg2-FP4E2M1-fp16-3D-8M-floor"
# ============================================================
# 边界/特殊 case
# ============================================================
- operator: DynamicMxQuantWithDualAxis
  case_id: 19
  input_shape: [[2, 3, 7, 11, 512]]
  dtype: [bfloat16]
  attrs: {round_mode: rint, dst_type: 40, scale_alg: 0, dst_type_max: 0.0}
  value_range: [0, 0]
  note: "边界-全零输入-5D-236K-FP4E2M1"
- operator: DynamicMxQuantWithDualAxis
  case_id: 20
  input_shape: [[1537, 769]]
  dtype: [float16]
  attrs: {round_mode: rint, dst_type: 36, scale_alg: 0, dst_type_max: 0.0}
  value_range: [-0.001, 0.001]
  note: "边界-极小值域-2D-1.2M-非对齐-FP8E4M3"
