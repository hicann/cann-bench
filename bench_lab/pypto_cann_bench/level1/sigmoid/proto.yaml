operator:
  name: Sigmoid
  category: Elementwise
  difficulty: L1
  formula: y = 1 / (1 + e^(-x))
  description: PyPTO 专用 Sigmoid selected-case 任务，计算 float32 2D 输入张量的 Sigmoid 激活
  shape_support: 本任务仅覆盖 2D 输入张量，输出与输入相同 shape
  attrs: []
  inputs:
  - name: x
    description: 输入张量；本任务仅覆盖 float32 2D selected cases
    dtype:
    - float32
  outputs:
  - name: y
    description: Sigmoid 激活结果，输出 shape 与输入一致，dtype 为 float32
    dtype:
    - float32
  schema: sigmoid(Tensor x) -> Tensor y
